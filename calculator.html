<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style> 
    body{
        height:100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin:0;
        background-color: rgb(29, 28, 28);
    }
    .container{
        border:1px solid rgba(29, 19, 19 ,3) ;
        height:70vh;
        width:250px;
        display:flex;
        justify-content: center;
        align-items: center;
        flex-wrap:wrap;
        background-color: rgb(59, 58, 58);
        border-radius: 15px;
       
    }
     button{
     height:40px;
     width:40px;
     border:none;
     border-radius : 50%;
     background-color :grey;
     margin-right : 10px;
     margin-left:10px;
     margin-top:1px;}
    button:hover{
        cursor:pointer;
        background-color: rgb(100, 72, 72);
    }
    .screen{
        margin:5px 5px 5px;
        margin-bottom: 0;
        height:15%;
        width:90%;
        border:1px solid black;
        border-radius:15px;
        padding:5px;
        overflow-x:hidden;
        white-space:nowrap;
    }
   
    
    </style>
</head>
<body>
    <div class="container">
        <div class="screen"></div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
